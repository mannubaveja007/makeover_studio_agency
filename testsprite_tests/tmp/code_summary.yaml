version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16
  - React 19
  - Tailwind CSS 4
  - Framer Motion
  - Inter (Google Font)
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Single-page landing website for Content Makeover Studio — a UGC creator portfolio website agency
features:
  - name: Navigation
    description: Fixed top navigation bar with desktop links and mobile hamburger menu with animated slide-down drawer
    files:
      - src/components/sections/Nav.tsx
      - src/lib/constants.ts
    entry_route: /
    user_interactions:
      - Click navigation links (Why a Portfolio, Process, Work, Packages, Contact) to smooth-scroll to sections
      - Click Instagram button to open Instagram in new tab
      - Click hamburger icon on mobile to open/close mobile menu
      - Observe header background change on scroll (transparent to blurred white)
    api_calls: []
    auth_required: false
  - name: Hero Section
    description: Full-viewport hero section with animated headline, subheadline, and two CTA buttons
    files:
      - src/components/sections/Hero.tsx
      - src/components/ui/AnimatedSection.tsx
      - src/lib/constants.ts
    entry_route: /
    user_interactions:
      - Click "Book a Free Call" button to open Instagram DM in new tab
      - Click "See Our Work" button to scroll to Work section
      - Observe fade-up entrance animations on page load
    api_calls: []
    auth_required: false
  - name: Problem Section
    description: Section highlighting three value propositions for UGC creators - why they need a portfolio website
    files:
      - src/components/sections/Problem.tsx
      - src/components/ui/AnimatedSection.tsx
      - src/lib/constants.ts
    entry_route: /
    user_interactions:
      - Scroll into view to trigger fade-up animations
      - Hover over cards to see lift effect
    api_calls: []
    auth_required: false
  - name: Process Section
    description: Four-step process timeline showing Discovery Call, Design, Build, and Launch & Support
    files:
      - src/components/sections/Process.tsx
      - src/components/ui/AnimatedSection.tsx
      - src/lib/constants.ts
    entry_route: /
    user_interactions:
      - Scroll into view to trigger staggered fade-up animations
      - Hover over process steps to see lift effect
    api_calls: []
    auth_required: false
  - name: Work Showcase
    description: Featured project showcase with project image, niche label, title, and description
    files:
      - src/components/sections/Work.tsx
      - src/components/ui/AnimatedSection.tsx
      - src/lib/constants.ts
    entry_route: /
    user_interactions:
      - Scroll into view to trigger fade-up animation
      - Hover over project image to see zoom effect
    api_calls: []
    auth_required: false
  - name: Pricing Packages
    description: Three pricing tiers (Starter $497, Pro $997, Custom) displayed in a responsive grid with features list
    files:
      - src/components/sections/Packages.tsx
      - src/components/ui/AnimatedSection.tsx
      - src/components/ui/Button.tsx
      - src/lib/constants.ts
    entry_route: /
    user_interactions:
      - Scroll into view to trigger staggered animations
      - Click "Get Started", "Most Popular", or "Book a Call" buttons to scroll to Contact section
    api_calls: []
    auth_required: false
  - name: Contact Section
    description: Contact section with Instagram DM CTA button and a contact form (desktop only) with name, handle/email, and message fields
    files:
      - src/components/sections/Contact.tsx
      - src/components/ui/AnimatedSection.tsx
      - src/components/ui/Button.tsx
      - src/lib/constants.ts
    entry_route: /
    user_interactions:
      - Click "DM us on Instagram" button to open Instagram DM in new tab
      - Fill in name input field (desktop only)
      - Fill in Instagram handle or email input field (desktop only)
      - Fill in message textarea (desktop only)
      - Click "Send message" button to submit the form
      - See confirmation message after form submission
    api_calls: []
    auth_required: false
  - name: Footer
    description: Simple footer with copyright year, Instagram handle link, and email link
    files:
      - src/components/sections/Footer.tsx
      - src/lib/constants.ts
    entry_route: /
    user_interactions:
      - Click Instagram handle to open Instagram in new tab
      - Click Email link to open email client
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Contact form is UI-only with no backend integration — submission only updates local React state
    location: src/components/sections/Contact.tsx
    impact: Form data is not persisted or sent anywhere; user sees a success message but no actual message is delivered
  - issue: Contact form is hidden on mobile (md:block)
    location: src/components/sections/Contact.tsx
    impact: Mobile users can only contact via Instagram DM, not via the form
  - issue: Project image uses a placeholder path that may not exist
    location: src/lib/constants.ts
    impact: The featured project image at /images/project-placeholder.jpg may show a broken image if the file is missing
